<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mission Control — Aziri</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#576BFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mission Control">

<style>
:root{--primary:#576BFF;--primary-dim:#3a52e8;--primary-light:#eef0ff;--s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;--s800:#1e293b;--s900:#0f172a;--green:#22c55e;--gbg:#f0fdf4;--gtxt:#166534;--gborder:#bbf7d0;--amber:#f59e0b;--abg:#fffbeb;--atxt:#92400e;--aborder:#fde68a;--red:#ef4444;--rbg:#fef2f2;--rtxt:#991b1b;--rborder:#fecaca;--rmd:10px;--rlg:14px;--rxl:20px;--font:'DM Sans','Segoe UI',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--s50);color:var(--s800);min-height:100vh;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:var(--font);}
input,textarea,select{font-family:var(--font);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--s300);border-radius:3px;}
.topbar{background:#fff;border-bottom:1px solid var(--s200);height:58px;display:flex;align-items:center;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;}
.topbar-right{margin-left:auto;position:relative;}
.am-btn{display:flex;align-items:center;gap:10px;padding:6px 12px 6px 8px;border-radius:var(--rlg);border:1px solid var(--s200);background:#fff;cursor:pointer;transition:all .15s;font-family:var(--font);}
.am-btn:hover{background:var(--s50);border-color:var(--s300);}
.am-btn-inner{display:flex;flex-direction:column;align-items:flex-start;gap:1px;}
.am-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--s400);}
.am-name{font-size:13px;font-weight:600;color:var(--s800);}
.am-chevron{color:var(--s400);transition:transform .2s;}
.am-chevron.open{transform:rotate(180deg);}
.am-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.am-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid var(--s200);border-radius:var(--rlg);box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:220px;z-index:300;overflow:hidden;animation:fadedown .15s ease;}
@keyframes fadedown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.am-section-label{padding:10px 14px 6px;font-size:10px;font-weight:700;color:var(--s400);text-transform:uppercase;letter-spacing:.8px;}
.am-option{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .12s;}
.am-option:hover{background:var(--s50);}
.am-option.active{background:var(--primary-light);}
.am-option-name{font-size:13.5px;font-weight:500;color:var(--s800);flex:1;}
.am-check{color:var(--primary);flex-shrink:0;}
.am-add{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:13px;color:var(--primary);font-weight:600;cursor:pointer;border-top:1px solid var(--s200);transition:background .12s;}
.am-add:hover{background:var(--primary-light);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rmd);font-size:13.5px;font-weight:500;border:1px solid transparent;transition:all .15s;white-space:nowrap;cursor:pointer;}
.bp{background:var(--primary);color:#fff;border-color:var(--primary);}
.bp:hover{background:var(--primary-dim);}
.bp:disabled{opacity:.4;cursor:not-allowed;}
.bg{background:transparent;color:var(--s600);border-color:var(--s200);}
.bg:hover{background:var(--s100);color:var(--s800);}
.bd{background:var(--rbg);color:var(--rtxt);border-color:var(--rborder);}
.bd:hover{background:#fee2e2;}
.bsm{padding:5px 11px;font-size:12.5px;}
.bi{padding:6px;border-radius:var(--rmd);background:transparent;border:1px solid var(--s200);color:var(--s500);transition:all .15s;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.bi:hover{background:var(--s100);color:var(--s700);}
.btn-amber{background:#f59e0b;color:#fff;border-color:#f59e0b;}
.btn-amber:hover{background:#d97706;}
.btn-amber:disabled{opacity:.4;cursor:not-allowed;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px 4px 8px;border-radius:999px;font-size:12.5px;font-weight:600;white-space:nowrap;border:1px solid transparent;}
.pill.g{background:var(--gbg);color:var(--gtxt);border-color:var(--gborder);}
.pill.a{background:var(--abg);color:var(--atxt);border-color:var(--aborder);}
.pill.r{background:var(--rbg);color:var(--rtxt);border-color:var(--rborder);}
.pill.done{background:#f0f4ff;color:#3730a3;border-color:#c7d2fe;}
.pill.done .pill-dot{background:#6366f1;}
.pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pill.g .pill-dot{background:var(--green);}
.pill.a .pill-dot{background:var(--amber);}
.pill.r .pill-dot{background:var(--red);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--s500);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;}
.field input,.field textarea,.field select{width:100%;padding:10px 13px;border:1px solid var(--s200);border-radius:var(--rmd);font-size:13.5px;color:var(--s800);outline:none;transition:border-color .15s,box-shadow .15s;background:#fff;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(87,107,255,.1);}
.field textarea{resize:vertical;min-height:80px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:var(--rxl);box-shadow:0 12px 40px rgba(0,0,0,.15);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;animation:slideup .18s ease;}
.modal-lg{max-width:640px;}
.modal-sm{max-width:420px;}
@keyframes slideup{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mhdr{padding:24px 24px 0;display:flex;align-items:flex-start;gap:14px;}
.mhdr-icon{width:42px;height:42px;background:var(--primary-light);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--primary);flex-shrink:0;}
.mhdr-text{flex:1;}
.mhdr-sup{font-size:10px;font-weight:700;color:var(--s400);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
.mtitle{font-size:19px;font-weight:700;color:var(--s900);}
.mhdr-close{color:var(--s400);cursor:pointer;padding:4px;border-radius:8px;border:none;background:transparent;transition:all .12s;display:flex;align-items:center;}
.mhdr-close:hover{background:var(--s100);color:var(--s700);}
.mbody{padding:20px 24px;}
.mftr{padding:0 24px 24px;display:flex;gap:8px;justify-content:flex-end;}
.page{max-width:1180px;margin:0 auto;padding:32px 28px;}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.kpi-card{position:relative;padding:22px 24px;border-radius:12px;border:1px solid #E2E8F0;background:#fff;display:flex;align-items:center;gap:16px;overflow:hidden;}
.kpi-card::before{content:"";position:absolute;inset:0;background:var(--kpi-tint,transparent);opacity:.6;pointer-events:none;}
.kpi-card>*{position:relative;}
.kpi-card.green{--kpi-tint:linear-gradient(135deg,rgba(16,185,129,0.06),rgba(16,185,129,0.02) 60%);}
.kpi-card.amber{--kpi-tint:linear-gradient(135deg,rgba(245,158,11,0.07),rgba(245,158,11,0.02) 60%);}
.kpi-card.red{--kpi-tint:linear-gradient(135deg,rgba(239,68,68,0.06),rgba(239,68,68,0.02) 60%);}
.kpi-icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;}
.kpi-icon svg{width:22px;height:22px;}
.kpi-card.green .kpi-icon{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0;}
.kpi-card.amber .kpi-icon{background:#FFFBEB;color:#D97706;border:1px solid #FDE68A;}
.kpi-card.red .kpi-icon{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;}
.kpi-value{font-size:32px;font-weight:700;letter-spacing:-0.02em;line-height:1;font-variant-numeric:tabular-nums;}
.kpi-card.green .kpi-value{color:#047857;}
.kpi-card.amber .kpi-value{color:#D97706;}
.kpi-card.red .kpi-value{color:#B91C1C;}
.kpi-label{margin-top:6px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#64748B;}
@media(max-width:768px){.kpi-grid{grid-template-columns:1fr 1fr !important;gap:8px;}}
@media(max-width:380px){.kpi-grid{grid-template-columns:1fr !important;}}
@media(max-width:768px){
  .topbar{padding:0 14px;height:52px;}
  .topbar img{height:26px;}
  .am-btn-inner .am-name{font-size:12px;}
  .am-btn{padding:5px 9px 5px 7px;gap:7px;}
  .page{padding:12px 10px;}
  .dhdr{padding:0 10px;}
  .dhdr-inner{padding:10px 0;gap:8px;flex-wrap:wrap;}
  .gauge-grid{grid-template-columns:repeat(3,1fr) !important;gap:5px;}
  .gauge-sublabel{display:none;}
  .gauge-hint{display:none;}
  .phase-cards{flex-direction:column;}
  .phase-card{flex:none;width:100%;}
  .gantt-wrap{font-size:11px;}
  .section-card{padding:12px;}
  .kpi-value{font-size:20px;}
  .kpi-card{padding:10px 12px;gap:8px;}
  .kpi-icon{width:32px;height:32px;border-radius:8px;}
  .kpi-icon svg{width:16px;height:16px;}
  .kpi-label{font-size:9.5px;letter-spacing:0.04em;}
  .tab-bar{flex-wrap:nowrap;overflow-x:auto;}
  .tab{font-size:12px;padding:5px 10px;}
  .fr2{grid-template-columns:1fr;}
  .modal{max-height:95vh;}
  .mhdr{padding:16px 16px 0;}
  .mbody{padding:14px 16px;}
  .mftr{padding:0 16px 16px;}
  .client-header{padding:10px 12px;}
  .tbar{flex-wrap:wrap;gap:8px;}
  .tbar input{min-width:0;}
  .project-row{padding:10px 12px 10px 16px;flex-wrap:wrap;gap:8px;}
  .project-name{font-size:13px;}
  .project-meta{font-size:11px;}
  .btn{font-size:12.5px;padding:7px 12px;}
  .bsm{padding:5px 9px;font-size:11.5px;}
}
.twrap{background:#fff;border:1px solid var(--s200);border-radius:var(--rlg);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.tbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--s100);}
.client-group{border-bottom:1px solid var(--s100);}
.client-group:last-child{border-bottom:none;}
.client-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:background .12s;background:#fff;}
.client-header:hover{background:var(--s50);}
.client-header-name{font-size:14px;font-weight:700;color:var(--s900);flex:1;}
.client-header-count{font-size:12px;color:var(--s400);margin-right:4px;}
.client-chevron{color:var(--s400);transition:transform .2s;display:flex;align-items:center;}
.client-chevron.open{transform:rotate(90deg);}
.client-projects{border-top:1px solid var(--s100);}
.project-row{display:flex;align-items:center;gap:14px;padding:13px 16px 13px 20px;border-bottom:1px solid var(--s100);cursor:pointer;transition:background .12s;position:relative;}
.project-row:last-child{border-bottom:none;}
.project-row:hover{background:var(--s50);}
.project-status-bar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.project-status-bar.g{background:var(--green);}
.project-status-bar.a{background:var(--amber);}
.project-status-bar.r{background:var(--red);}
.project-info{flex:1;min-width:0;}
.project-name{font-size:14px;font-weight:600;color:var(--s900);}
.project-meta{font-size:12px;color:var(--s500);margin-top:2px;}
.row-actions{display:flex;gap:5px;}
.dhdr{background:#fff;border-bottom:1px solid var(--s200);padding:0 28px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.dhdr-inner{max-width:1180px;margin:0 auto;padding:16px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.tab-bar{display:flex;gap:2px;padding:4px;background:var(--s100);border-radius:var(--rmd);border:1px solid var(--s200);overflow-x:auto;max-width:100%;}
.tab{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:500;color:var(--s500);cursor:pointer;transition:all .12s;border:none;background:transparent;display:flex;align-items:center;gap:7px;white-space:nowrap;flex-shrink:0;}
.tab.active{background:#fff;color:var(--s900);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.section-card{background:#fff;border:1px solid var(--s200);border-radius:var(--rlg);padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:16px;overflow:hidden;}
.section-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.section-title-row{display:flex;align-items:center;gap:9px;}
.section-title{font-size:15px;font-weight:700;color:var(--s900);}
.section-subtitle{font-size:12.5px;color:var(--s500);margin-top:2px;}
.gauge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;}
.gauge-grid>div{min-width:0;overflow:hidden;}
.phase-cards{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
.phase-card{flex:0 0 190px;border:1.5px solid var(--s200);border-radius:var(--rlg);padding:14px;cursor:pointer;transition:all .15s;background:#fff;}
.phase-card:hover{border-color:var(--s300);background:var(--s50);}
.phase-card.g{border-color:var(--gborder);}
.phase-card.a{border-color:var(--aborder);}
.phase-card.r{border-color:var(--rborder);}
.phase-card-name{font-size:13.5px;font-weight:600;color:var(--s800);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px;}
.phase-card-status{margin-bottom:8px;}
.phase-card-date{font-size:11px;color:var(--s400);}
.gantt-wrap{overflow-x:auto;}
.gantt-table{min-width:800px;border-collapse:collapse;}
.gantt-table td,.gantt-table th{border:none;padding:0;}
.gantt-months th{font-size:10.5px;font-weight:700;color:var(--s500);text-transform:uppercase;letter-spacing:.5px;padding:6px 0;text-align:center;}
.gantt-half-hdr{font-size:10px;color:var(--s400);padding:2px 0;text-align:center;border-left:1px solid var(--s100);}
.gantt-row td{height:38px;border-bottom:1px solid var(--s100);}
.gantt-row:last-child td{border-bottom:none;}
.gantt-label{font-size:12.5px;color:var(--s600);font-weight:500;padding-right:12px;white-space:nowrap;display:flex;align-items:center;gap:6px;min-width:150px;}
.gantt-cell{position:relative;border-left:1px solid var(--s100);}
.gantt-bar{position:absolute;top:7px;height:22px;border-radius:5px;cursor:pointer;transition:filter .12s;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;z-index:2;}
.gantt-bar:hover{filter:brightness(1.08);}
.date-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px;}
.date-chip{padding:7px 4px;border:1px solid var(--s200);border-radius:var(--rmd);font-size:12px;text-align:center;cursor:pointer;transition:all .12s;background:#fff;color:var(--s700);}
.date-chip:hover{border-color:var(--primary);color:var(--primary);}
.date-chip.selected{background:var(--primary);color:#fff;border-color:var(--primary);}
.status-chips{display:flex;gap:8px;flex-wrap:wrap;}
.status-chip{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:999px;border:1.5px solid var(--s200);cursor:pointer;font-size:13px;font-weight:500;color:var(--s600);background:#fff;transition:all .12s;}
.status-chip.selected-g{border-color:var(--green);background:var(--gbg);color:var(--gtxt);}
.status-chip.selected-a{border-color:var(--amber);background:var(--abg);color:var(--atxt);}
.status-chip.selected-r{border-color:var(--red);background:var(--rbg);color:var(--rtxt);}
.status-chip-dot{width:8px;height:8px;border-radius:50%;}
.notes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:200px;overflow-y:auto;}
.note-item{background:var(--s50);border:1px solid var(--s200);border-radius:var(--rmd);padding:12px 14px;}
.notes-input{width:100%;padding:11px 13px;border:1px solid var(--s200);border-radius:var(--rmd);font-size:13.5px;resize:none;height:80px;outline:none;transition:border-color .15s,box-shadow .15s;color:var(--s800);}
.notes-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(87,107,255,.1);}
.oos-form{background:var(--s50);border:1px solid var(--s200);border-radius:var(--rlg);padding:16px;}
.oot{width:100%;font-size:13px;border-collapse:collapse;}
.oot th{text-align:left;padding:8px 10px;font-size:10.5px;font-weight:700;color:var(--s400);border-bottom:1px solid var(--s200);text-transform:uppercase;letter-spacing:.5px;}
.oot td{padding:10px;border-bottom:1px solid var(--s100);vertical-align:top;}
.oot tr:last-child td{border-bottom:none;}
.lic-add-btn{width:100%;padding:10px;border:1.5px dashed var(--s300);border-radius:var(--rmd);background:transparent;color:var(--s500);font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.lic-add-btn:hover{border-color:var(--primary);color:var(--primary);}
.logo-upload-area{border:2px dashed var(--s300);border-radius:var(--rlg);padding:18px;text-align:center;cursor:pointer;transition:border-color .15s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.logo-upload-area:hover{border-color:var(--primary);}
.toggle-switch{width:38px;height:22px;border-radius:999px;border:none;cursor:pointer;padding:2px;transition:background .2s;flex-shrink:0;}
.toggle-switch.off{background:var(--s200);}
.toggle-switch.on{background:var(--primary);}
.toggle-knob{width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-switch.on .toggle-knob{transform:translateX(16px);}
.empty-st{text-align:center;padding:48px 20px;color:var(--s400);}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--s400);font-size:14px;gap:8px;}
</style>
</head>

async function fetchAMs(){
  const{data}=await sb.from('mc_account_managers').select('*').order('id');
  return(data??[]).map(a=>({...a,initials:a.initials||(a.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),gradient:a.gradient||hcol(a.name||'')}));
}
async function dbInsertAM(name){
  const initials=name.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const gradients=['linear-gradient(135deg,#576BFF,#8B5CF6)','linear-gradient(135deg,#0EA5E9,#14B8A6)','linear-gradient(135deg,#F59E0B,#EF4444)','linear-gradient(135deg,#10B981,#059669)'];
  const gradient=gradients[Math.floor(Math.random()*gradients.length)];
  let r=await sb.from('mc_account_managers').insert({name:name.trim(),initials,gradient}).select().single();
  if(r.error)r=await sb.from('mc_account_managers').insert({name:name.trim()}).select().single();
  const d=r.data;
  return d?{...d,initials:d.initials||initials,gradient:d.gradient||gradient}:{id:uid(),name:name.trim(),initials,gradient};
}

async function fetchProjects(ownerId){
  // Fetch root projects (parent_id IS NULL) — these are the "main" projects shown in overview
  const{data:roots,error}=await sb.from('mc_projects').select('*').eq('owner_id',ownerId).is('parent_id',null).order('created_at',{ascending:false});
  if(error)throw new Error(error.message);
  if(!roots?.length)return[];
  // Also fetch sub-projects (deelprojecten) for each root
  const rootIds=roots.map(p=>p.id);
  const{data:subs}=await sb.from('mc_projects').select('*').eq('owner_id',ownerId).in('parent_id',rootIds).order('created_at',{ascending:true});
  // Collect all IDs for related data
  const allIds=[...rootIds,...(subs??[]).map(s=>s.id)];
  const[l,ph,n,o]=await Promise.all([
    sb.from('mc_licenties').select('*').in('project_id',allIds).order('sort_order'),
    sb.from('mc_phases').select('*').in('project_id',allIds).order('sort_order'),
    sb.from('mc_notes').select('*').in('project_id',allIds).order('created_at'),
    sb.from('mc_oos_items').select('*').in('project_id',allIds).order('created_at'),
  ]);
  const enrich=p=>({
    ...p,offerte_total:Number(p.offerte_total||0),licentie_jr:Number(p.licentie_jr||0),
    licenties:(l.data??[]).filter(x=>x.project_id===p.id).map(x=>({...x,cost:Number(x.cost)})),
    phases:(ph.data??[]).filter(x=>x.project_id===p.id),
    notes:(n.data??[]).filter(x=>x.project_id===p.id),
    oos_items:(o.data??[]).filter(x=>x.project_id===p.id).map(x=>({...x,price:Number(x.price)})),
  });
  return roots.map(r=>({...enrich(r),deelprojecten:(subs??[]).filter(s=>s.parent_id===r.id).map(enrich)}));
}

async function dbInsertProject(data){
  const{licenties,...row}=data;
  const{data:p,error}=await sb.from('mc_projects').insert({...row,parent_id:null}).select().single();
  if(error)throw new Error(error.message);
  await Promise.all([
    licenties.length&&sb.from('mc_licenties').insert(licenties.map((l,i)=>({...l,project_id:p.id,sort_order:i}))),
    sb.from('mc_phases').insert(PHASE_DEFS.map((d,i)=>({project_id:p.id,key:d.key,status:'g',note:'',sort_order:i}))),
  ]);
  return{...p,offerte_total:Number(p.offerte_total||0),licentie_jr:Number(p.licentie_jr||0),licenties:[],phases:[],notes:[],oos_items:[],deelprojecten:[]};
}

async function dbInsertDeelproject(parentId,ownerId,client,data){
  const{licenties,...row}=data;
  const{data:p,error}=await sb.from('mc_projects').insert({...row,parent_id:parentId,owner_id:ownerId,client}).select().single();
  if(error)throw new Error(error.message);
  await Promise.all([
    licenties&&licenties.length&&sb.from('mc_licenties').insert(licenties.map((l,i)=>({...l,project_id:p.id,sort_order:i}))),
    sb.from('mc_phases').insert(PHASE_DEFS.map((d,i)=>({project_id:p.id,key:d.key,status:'g',note:'',sort_order:i}))),
  ]);
  return{...p,offerte_total:Number(p.offerte_total||0),licentie_jr:Number(p.licentie_jr||0),licenties:licenties||[],phases:PHASE_DEFS.map((d,i)=>({project_id:p.id,key:d.key,status:'g',note:'',sort_order:i,updated_at:new Date().toISOString()})),notes:[],oos_items:[]};

async function dbUpdateProject(p){
  const{licenties,phases,notes,oos_items,deelprojecten,...row}=p;
  const{error}=await sb.from('mc_projects').upsert(row);
  if(error)throw new Error(error.message);
}
async function dbSyncLicenties(projectId,lics){
  await sb.from('mc_licenties').delete().eq('project_id',projectId);
  if(lics.length)await sb.from('mc_licenties').insert(lics.map((l,i)=>({...l,project_id:projectId,sort_order:i})));
  await sb.from('mc_projects').update({licentie_jr:lics.reduce((s,l)=>s+l.cost,0),last_updated:new Date().toISOString()}).eq('id',projectId);
}
async function dbUpdateGauges(projectId,gauges,ps){
  await sb.from('mc_projects').update({...gauges,project_status:ps,last_updated:new Date().toISOString()}).eq('id',projectId);
}
async function dbUpdatePhase(projectId,key,data){
  await sb.from('mc_phases').update({...data,updated_at:new Date().toISOString()}).eq('project_id',projectId).eq('key',key);
  // Only count non-done phases for timeline status rollup
  const{data:phases}=await sb.from('mc_phases').select('status,done').eq('project_id',projectId);
  const active=(phases??[]).filter(p=>!p.done);
  const ss=active.length>0?active.map(p=>p.status):(phases??[]).map(p=>p.status);
  const tl=ss.includes('r')?'r':ss.includes('a')?'a':'g';
  await sb.from('mc_projects').update({timeline_status:tl,last_updated:new Date().toISOString()}).eq('id',projectId);
  return tl;
}

const eur=n=>n==null?'—':new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fdate=iso=>iso?new Date(iso).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}):'—';
const fdshort=iso=>iso?new Date(iso).toLocaleDateString('nl-NL',{day:'numeric',month:'short'}):'—';
function hcol(s){const cs=['linear-gradient(135deg,#576BFF,#8B5CF6)','linear-gradient(135deg,#0EA5E9,#14B8A6)','linear-gradient(135deg,#F59E0B,#EF4444)','linear-gradient(135deg,#10B981,#059669)','linear-gradient(135deg,#EC4899,#8B5CF6)','linear-gradient(135deg,#6366F1,#3B82F6)'];let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return cs[Math.abs(h)%cs.length];}
const slbl=s=>({g:'Op koers',a:'Risico',r:'Kritiek',done:'Afgerond'}[s]||s);
function projectDoneStatus(phases){
  if(!phases||phases.length===0) return null;
  const nonSupport=phases.filter(p=>p.key!=='Support');
  const allDone=phases.every(p=>p.done);
  const allExceptSupportDone=nonSupport.length>0&&nonSupport.every(p=>p.done);
  return (allDone||allExceptSupportDone)?'done':null;
}
function drollup(g){const v=[g.gauge_timing,g.gauge_budget,g.gauge_scope];return v.includes('r')?'r':v.includes('a')?'a':'g';}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function gaugeClickZone(e,onSet){const rect=e.currentTarget.getBoundingClientRect();const x=e.clientX-rect.left;const w=rect.width;if(x<w/3)onSet('g');else if(x<2*w/3)onSet('a');else onSet('r');}
function downscale(file,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const sz=256,rat=Math.min(sz/img.width,sz/img.height),c=document.createElement('canvas');c.width=img.width*rat;c.height=img.height*rat;c.getContext('2d').drawImage(img,0,0,c.width,c.height);cb(c.toDataURL('image/png'));};img.src=e.target.result;};r.readAsDataURL(file);}
function halfMonthPeriods(year){const months=['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];const p=[];for(let m=0;m<12;m++){p.push({label:`${months[m]} 1-15`,value:`${year}-${String(m+1).padStart(2,'0')}-01`});const ld=new Date(year,m+1,0).getDate();p.push({label:`${months[m]} 16-${ld}`,value:`${year}-${String(m+1).padStart(2,'0')}-16`});}return p;}

// ── Speedometer Gauge ─────────────────────────────────────
function SpeedoGauge({label,sublabel,status,onSet}){
  const color={g:'#22c55e',a:'#f59e0b',r:'#ef4444'}[status];
  const txt={g:'OP SCHEMA',a:'RISICO',r:'KRITIEK'}[status];
  const cx=110,cy=108,R=88,tR=74;
  const p=d=>{const a=d*Math.PI/180;return[cx+R*Math.cos(a),cy-R*Math.sin(a)];};
  const tp=d=>{const a=d*Math.PI/180;return[cx+tR*Math.cos(a),cy-tR*Math.sin(a)];};
  const[lx,ly]=p(180);const[rx,ry]=p(0);
  const[tl,tlY]=tp(180);const[tg2,tg2Y]=tp(120);const[ta2,ta2Y]=tp(60);const[tr,trY]=tp(0);
  const na={g:150,a:90,r:30}[status]*Math.PI/180;
  const nLen=68,nTail=12;
  const[nx2,ny2]=[cx+nLen*Math.cos(na),cy-nLen*Math.sin(na)];
  const[nx3,ny3]=[cx+nTail*Math.cos(na+Math.PI),cy-nTail*Math.sin(na+Math.PI)];
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 4px 8px',border:'1px solid var(--s200)',borderRadius:12,position:'relative',userSelect:'none',cursor:'pointer',background:'#fff',transition:'border-color .15s',overflow:'hidden'}}
      onClick={e=>gaugeClickZone(e,onSet)}
      onMouseEnter={e=>e.currentTarget.style.borderColor='var(--s300)'}
      onMouseLeave={e=>e.currentTarget.style.borderColor='var(--s200)'}
      title="← Op schema | Risico | Kritiek →">
      <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.6px',color:'var(--s400)'}}>{label}</div>
      <svg width="100%" height="auto" viewBox="0 0 220 116" style={{display:'block',maxWidth:220}}>
        <defs>
          <radialGradient id={`dg-${label}`} cx="50%" cy="100%" r="90%"><stop offset="0%" stopColor="#1e2d3d"/><stop offset="100%" stopColor="#0b1520"/></radialGradient>
          <clipPath id={`cp-${label}`}><rect x="0" y="0" width="220" height="116"/></clipPath>
        </defs>
        <g clipPath={`url(#cp-${label})`}>
          <path d={`M${lx} ${ly} A${R} ${R} 0 0 1 ${rx} ${ry} L${cx} ${cy} Z`} fill={`url(#dg-${label})`}/>
          <path d={`M${lx} ${ly} A${R} ${R} 0 0 1 ${rx} ${ry}`} fill="none" stroke="#2a3f55" strokeWidth="1.5"/>
          <path d={`M${tl} ${tlY} A${tR} ${tR} 0 0 1 ${tr} ${trY}`} fill="none" stroke="#172031" strokeWidth="11" strokeLinecap="butt"/>
          <path d={`M${tl} ${tlY} A${tR} ${tR} 0 0 1 ${tg2} ${tg2Y}`} fill="none" stroke="#22c55e" strokeWidth="11" strokeOpacity={status==='g'?'1':'.28'} strokeLinecap="butt"/>
          <path d={`M${tg2} ${tg2Y} A${tR} ${tR} 0 0 1 ${ta2} ${ta2Y}`} fill="none" stroke="#f59e0b" strokeWidth="11" strokeOpacity={status==='a'?'1':'.28'} strokeLinecap="butt"/>
          <path d={`M${ta2} ${ta2Y} A${tR} ${tR} 0 0 1 ${tr} ${trY}`} fill="none" stroke="#ef4444" strokeWidth="11" strokeOpacity={status==='r'?'1':'.28'} strokeLinecap="butt"/>
          {[180,150,120,90,60,30,0].map((deg,i)=>{const a=deg*Math.PI/180;return<line key={deg} x1={cx+(R-1)*Math.cos(a)} y1={cy-(R-1)*Math.sin(a)} x2={cx+(R-9)*Math.cos(a)} y2={cy-(R-9)*Math.sin(a)} stroke="#3a5272" strokeWidth={i%3===0?1.8:1}/>;} )}
          <text x={cx} y={cy-28} textAnchor="middle" fill={color} fontSize="11" fontWeight="800" fontFamily="DM Sans,sans-serif" letterSpacing="1">{txt}</text>
          <line x1={nx3} y1={ny3} x2={nx2} y2={ny2} stroke={color} strokeWidth="3" strokeLinecap="round" style={{transition:'all .4s cubic-bezier(.34,1.1,.64,1)'}}/>
          <line x1={cx} y1={cy} x2={nx3} y2={ny3} stroke={color} strokeWidth="2" strokeLinecap="round" strokeOpacity=".35"/>
          <circle cx={cx} cy={cy} r="7" fill="#1a2a3a" stroke="#2a3f55" strokeWidth="1.5"/>
          <circle cx={cx} cy={cy} r="3.5" fill={color}/>
        </g>
      </svg>
      <div className="gauge-sublabel" style={{fontSize:10,color:'var(--s500)',marginTop:2}}>{sublabel}</div>
      <div className="gauge-hint" style={{fontSize:9,color:'#c0ccd8',position:'absolute',bottom:3,right:6}}>← ● →</div>
    </div>
  );
}

function PhaseCard({phase,onClick,onToggleDone}){
  const def=PHASE_DEFS.find(d=>d.key===phase.key)||{icon:'📌'};
  const updAt=phase.updated_at||phase.created_at;
  const done=phase.done;
  return(
    <div className={`phase-card ${done?'done':phase.status}`} onClick={onClick}
      style={{opacity:done?.7:1,background:done?'var(--s50)':'#fff',borderColor:done?'var(--s200)':undefined,position:'relative'}}>

        style={{position:'absolute',top:10,right:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',

      </div>
      <div className="phase-card-name" style={{paddingRight:24}}>
        <span style={{fontSize:16}}>{done?'✓':def.icon}</span>
        <span style={{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',textDecoration:done?'line-through':'none',color:done?'var(--s400)':'inherit'}}>{phase.key}</span>
      </div>
      {done
        ?<div style={{fontSize:11,fontWeight:700,color:'var(--s400)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Afgerond</div>

  );
}

function GanttChart({phases,onPhaseClick}){
  const today=new Date();const year=today.getFullYear();
  const months=['JAN','FEB','MRT','APR','MEI','JUN','JUL','AUG','SEP','OKT','NOV','DEC'];
  const hw=36;
  const d2h=ds=>{if(!ds)return null;const d=new Date(ds);return d.getMonth()*2+(d.getDate()<=15?0:1);};
  const todayH=today.getMonth()*2+(today.getDate()<=15?0:1);
  const todayOff=(today.getDate()<=15?(today.getDate()-1)/15:(today.getDate()-16)/15)*hw;
  const bc={g:'#22c55e',a:'#f59e0b',r:'#ef4444'};
  return(
    <div className="gantt-wrap">
      <table className="gantt-table">
        <thead>
          <tr className="gantt-months">
            <th style={{width:150,textAlign:'left',paddingLeft:4}}></th>
            {months.map((m,i)=><th key={i} colSpan={2} style={{borderLeft:'1px solid var(--s100)',paddingBottom:8}}>{m} {year}</th>)}
          </tr>
        </thead>
        <tbody>
          <tr className="gantt-row">
            <td style={{paddingLeft:4}}><span style={{fontSize:12,fontWeight:700,color:'var(--green)'}}>Vandaag</span></td>
            {Array.from({length:24},(_,i)=>(
              <td key={i} className="gantt-cell" style={{position:'relative',width:hw}}>
                {i===todayH&&<>
                  <div style={{position:'absolute',top:0,bottom:0,left:todayOff,width:2,background:'var(--green)',zIndex:4}}/>
                  <div style={{position:'absolute',top:0,left:todayOff,transform:'translateX(-50%)'}}>
                    <div style={{background:'#fff',border:'1.5px solid var(--green)',borderRadius:999,fontSize:10,fontWeight:700,color:'var(--gtxt)',padding:'1px 7px',whiteSpace:'nowrap',marginTop:-20}}>vandaag</div>
                  </div>
                </>}
              </td>
            ))}
          </tr>
          {phases.map(phase=>{
            const def=PHASE_DEFS.find(d=>d.key===phase.key)||{icon:'📌'};
            const sh=d2h(phase.start_date);const eh=d2h(phase.end_date);
            const done=phase.done;
            const barColor=done?'#94a3b8':bc[phase.status];
            return(
              <tr key={phase.key} className="gantt-row">
                <td><div className="gantt-label" style={{opacity:done?.6:1}}>
                  <span style={{fontSize:13}}>{done?'✓':def.icon}</span>
                  <span style={{textDecoration:done?'line-through':'none',color:done?'var(--s400)':'inherit'}}>{phase.key}</span>
                </div></td>
                {Array.from({length:24},(_,i)=>(
                  <td key={i} className="gantt-cell" style={{width:hw}}>
                    {sh!==null&&i===sh&&eh!==null&&(
                      <div className="gantt-bar" style={{background:barColor,left:0,width:`${(eh-sh+1)*hw}px`,opacity:done?.7:1}} onClick={()=>onPhaseClick(phase)}>
                        {done?'✓ ':''}{phase.key}
                      </div>
                    )}
                  </td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

        <span style={{fontSize:12,color:'var(--s400)'}}>{p.notes.length} notities</span>
      </div>
      {p.notes.length>0&&<div className="notes-list">{[...p.notes].reverse().map(n=><div key={n.id} className="note-item"><div style={{fontSize:13.5,color:'var(--s700)',lineHeight:1.55}}>{n.text}</div><div style={{fontSize:11,color:'var(--s400)',marginTop:5}}>{fdate(n.created_at)}</div></div>)}</div>}
      <textarea className="notes-input" value={noteTxt} onChange={e=>setNoteTxt(e.target.value)} placeholder="Voeg een notitie toe... (⌘+Enter om op te slaan)" onKeyDown={e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&noteTxt.trim()){dbAddNote(p.id,noteTxt.trim()).then(n=>upd({notes:[...p.notes,n]}));setNoteTxt('');}}}/>
      <div style={{display:'flex',justifyContent:'flex-end',marginTop:8}}>
        <button className="btn bp bsm" disabled={!noteTxt.trim()} onClick={async()=>{const n=await dbAddNote(p.id,noteTxt.trim());upd({notes:[...p.notes,n]});setNoteTxt('');}}><Ic.Notes/> Opslaan</button>
      </div>
    </div>

    {/* OOS */}
    <OOSCard items={p.oos_items}
      onAdd={async item=>{const o=await dbAddOOS(p.id,item);upd({oos_items:[...p.oos_items,o]});}}
      onRemove={async id=>{await dbDeleteOOS(id);upd({oos_items:p.oos_items.filter(o=>o.id!==id)});}}/>

    {editPhase&&<MilestoneModal phase={editPhase} onCancel={()=>setEditPhase(null)} onSave={async data=>{await handlePhase(editPhase.key,data);setEditPhase(null);}}/>}
  </>;
}

// ── Project Detail (with tabs for deelprojecten) ──────────
function ProjectDetail({project:init,siblings=[],ams,onBack,onChange,onAddProject,onSelectSibling}){
  const[p,setP]=useState(init);
  const[activeTab,setActiveTab]=useState(init.id); // default to main project tab
  const[showEdit,setShowEdit]=useState(false);
  const[showNewDeel,setShowNewDeel]=useState(false);
  const[deleteDeelId,setDeleteDeelId]=useState(null);

  const upd=patch=>{const np={...p,...patch};setP(np);onChange(np);};
  const updDeel=deel=>{
    const deelprojecten=p.deelprojecten.map(d=>d.id===deel.id?deel:d);
    upd({deelprojecten});
  };

  const handleEditSave=async f=>{
    const licentieJr=f.licenties.reduce((s,l)=>s+Number(l.cost),0);
    const updated={...p,...f,licentie_jr:licentieJr,last_updated:new Date().toISOString()};
    await dbUpdateProject(updated);
    await dbSyncLicenties(p.id,f.licenties);
    const licenties=f.licenties.map((l,i)=>({...l,id:l.id||uid(),project_id:p.id,sort_order:i}));
    upd({...updated,licenties});
    setShowEdit(false);
  };

  const handleNewDeel=async f=>{
    try{
      const licentieJr=f.licenties.reduce((s,l)=>s+Number(l.cost),0);
      // Create as a NEW ROOT project (same client, no parent_id)
      const newP=await dbInsertProject({
        owner_id:p.owner_id,client:p.client,name:f.name,logo:f.logo||null,
        offerte_total:Number(f.offerte_total)||0,licentie_jr:licentieJr,
        gauge_timing:'g',gauge_budget:'g',gauge_scope:'g',
        timeline_status:'g',project_status:'g',
        created_at:new Date().toISOString(),last_updated:new Date().toISOString(),
        licenties:f.licenties,
      });
      // Add to global project list so it appears in overview
      onAddProject(newP);
      setShowNewDeel(false);
      // Navigate to the new project
      setTimeout(()=>onBack(),100);
    }catch(err){alert('Fout: '+err.message);}
  };

  const handleDeleteDeel=async()=>{
    await dbDeleteProject(deleteDeelId);
    const deelprojecten=p.deelprojecten.filter(d=>d.id!==deleteDeelId);
    upd({deelprojecten});
    if(activeTab===deleteDeelId)setActiveTab(p.id);
    setDeleteDeelId(null);
  };

  const activeP=activeTab===p.id?p:p.deelprojecten.find(d=>d.id===activeTab)||p;
  const isMainTab=activeTab===p.id;

  return<div>
    {/* Header — client level */}
    <div className="dhdr">
      <div className="dhdr-inner">
        <button style={{display:'flex',alignItems:'center',gap:5,fontSize:12.5,color:'var(--s500)',padding:'5px 9px',borderRadius:'var(--rmd)',border:'1px solid var(--s200)',background:'transparent',cursor:'pointer'}} onClick={onBack}><Ic.Back/> Overzicht</button>
        <Avatar logo={p.logo} client={p.client} size={44} rad={10}/>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:'var(--s900)',letterSpacing:'-.3px'}}>{p.client}</div>
          <div style={{fontSize:13,color:'var(--s500)',marginTop:1}}>
            {[p,...siblings].length} project{[p,...siblings].length!==1?'en':''}
            {' · '}{eur([p,...siblings].reduce((s,x)=>s+(x.offerte_total||0),0))} totaal offerte
          </div>
        </div>
        <div style={{marginLeft:'auto'}}>
          <button className="btn bg bsm" onClick={()=>setShowEdit(true)}><Ic.Edit/> Bewerken</button>
        </div>
      </div>
      {/* Tab bar — all client projects sorted by created_at, current highlighted */}
      <div style={{maxWidth:1180,margin:'0 auto',display:'flex',alignItems:'center',gap:8,paddingBottom:0,overflowX:'auto'}}>
        <div className="tab-bar" style={{flexShrink:0}}>
          {/* All client projects: current first, then siblings oldest→newest */}
          {[p,...siblings].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).map(proj=>{
            const isCurrent=proj.id===p.id;
            const dot=projectDoneStatus(proj.phases)?'var(--green)':proj.project_status==='r'?'var(--red)':proj.project_status==='a'?'var(--amber)':'var(--green)';
            return<button key={proj.id} className={`tab${isCurrent?' active':''}`}
              onClick={()=>!isCurrent&&onSelectSibling&&onSelectSibling(proj.id)}>
              <span style={{width:8,height:8,borderRadius:'50%',background:dot,flexShrink:0,display:'inline-block'}}/>
              {proj.name}
            </button>;
          })}
        </div>
        <button className="btn bg bsm" style={{flexShrink:0}} onClick={()=>setShowNewDeel(true)}><Ic.Plus/> Nieuw project</button>
      </div>
    </div>

    <div className="page" style={{paddingTop:24}}>
      <ProjectTabContent
        key={p.id}
        p={p}
        onUpdate={upd}
      />
    </div>

    {/* Edit main project modal */}
    {showEdit&&<div className="modal-backdrop"><div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
      <div className="mhdr"><div className="mhdr-icon"><Ic.Edit/></div><div className="mhdr-text"><div className="mhdr-sup">Project</div><div className="mtitle">Project bewerken</div></div><button className="mhdr-close" onClick={()=>setShowEdit(false)}><Ic.X/></button></div>
      <ProjectForm initial={p} activeAM={p.owner_id} onSave={handleEditSave} onCancel={()=>setShowEdit(false)} title="Opslaan"/>
    </div></div>}

    {/* New deelproject modal */}
    {showNewDeel&&<div className="modal-backdrop"><div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
      <div className="mhdr"><div className="mhdr-icon"><Ic.Layers/></div><div className="mhdr-text"><div className="mhdr-sup">{p.client}</div><div className="mtitle">Nieuw project</div></div><button className="mhdr-close" onClick={()=>setShowNewDeel(false)}><Ic.X/></button></div>
      <ProjectForm initial={{name:'',logo:p.logo,offerte_total:'',owner_id:p.owner_id,licenties:[]}} activeAM={p.owner_id} onSave={handleNewDeel} onCancel={()=>setShowNewDeel(false)} title="Project aanmaken"/>
    </div></div>}

    {deleteDeelId&&<DeleteModal name={p.deelprojecten.find(d=>d.id===deleteDeelId)?.name||'Project'} onConfirm={handleDeleteDeel} onCancel={()=>setDeleteDeelId(null)}/>}
  </div>;
}

// ── Overview ──────────────────────────────────────────────
function Overview({projects,onSelect,onNew,onEdit,onDelete}){
  const[q,setQ]=useState('');
  const[collapsed,setCollapsed]=useState({});

  const clients=useMemo(()=>{
    const map={};
    projects.forEach(p=>{if(!map[p.client])map[p.client]={name:p.client,logo:p.logo,projects:[]};map[p.client].projects.push(p);});
    // Sort projects within each client oldest first
    Object.values(map).forEach(cl=>cl.projects.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)));
    return Object.values(map).sort((a,b)=>a.name.localeCompare(b.name));
  },[projects]);

  const filtered=useMemo(()=>{
    if(!q)return clients;
    const ql=q.toLowerCase();
    return clients.map(cl=>({...cl,projects:cl.projects.filter(p=>p.name.toLowerCase().includes(ql)||p.client.toLowerCase().includes(ql))})).filter(cl=>cl.projects.length>0);
  },[clients,q]);

  const cnt=useMemo(()=>{
    const c={g:0,a:0,r:0,done:0};
    projects.forEach(p=>{
      if(projectDoneStatus(p.phases)) c.done=(c.done||0)+1;
      else {const s=p.project_status||'g';c[s]=(c[s]||0)+1;}
    });
    return c;
  },[projects]);

  return<div className="page">
    <div style={{marginBottom:28}}>
      <div style={{fontSize:30,fontWeight:700,color:'var(--s900)',letterSpacing:'-.5px',marginBottom:4}}>Actieve projecten</div>
      <div style={{fontSize:14,color:'var(--s500)'}}>Bewaar overzicht over de gezondheid van alle klantprojecten.</div>
    </div>
    <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
      <div className="kpi-card green"><div className="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg></div><div><div className="kpi-value">{cnt.g||0}</div><div className="kpi-label">Op koers</div></div></div>
      <div className="kpi-card amber"><div className="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div><div className="kpi-value">{cnt.a||0}</div><div className="kpi-label">Waarschuwing</div></div></div>
      <div className="kpi-card red"><div className="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><div><div className="kpi-value">{cnt.r||0}</div><div className="kpi-label">Kritiek</div></div></div>
      <div className="kpi-card" style={{'--kpi-tint':'linear-gradient(135deg,rgba(99,102,241,0.07),rgba(99,102,241,0.02) 60%)'}}><div className="kpi-icon" style={{background:'#eef2ff',color:'#4338ca',border:'1px solid #c7d2fe'}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div><div className="kpi-value" style={{color:'#3730a3'}}>{cnt.done||0}</div><div className="kpi-label">Afgerond</div></div></div>
    </div>
    <div className="twrap">
      <div className="tbar">
        <div style={{position:'relative',flex:1,maxWidth:420}}>
          <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--s400)',pointerEvents:'none'}}><Ic.Search/></div>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Zoek op project of klantnaam..." style={{width:'100%',padding:'8px 12px 8px 34px',border:'1px solid var(--s200)',borderRadius:'var(--rmd)',fontSize:13,outline:'none',color:'var(--s800)'}}/>
        </div>
        <span style={{fontSize:12.5,color:'var(--s400)',marginLeft:'auto',marginRight:10}}>{projects.length} project{projects.length!==1?'en':''}</span>
        <button className="btn bp" onClick={onNew}><Ic.Plus/> Nieuw project</button>
      </div>
      {filtered.length===0&&<div className="empty-st"><div style={{fontSize:36,marginBottom:10}}>📋</div><p>{q?'Geen projecten gevonden.':'Nog geen projecten. Klik op "Nieuw project" om te starten.'}</p></div>}
      {filtered.map(client=>(
        <div key={client.name} className="client-group">
          <div className="client-header">
            <div style={{display:'flex',alignItems:'center',gap:10,flex:1,cursor:'pointer'}} onClick={()=>client.projects.length>0&&onSelect(client.projects[0].id)}>
              <Avatar logo={client.logo} client={client.name} size={30} rad={6}/>
              <span className="client-header-name">{client.name}</span>
              <span className="client-header-count">{client.projects.length} project{client.projects.length!==1?'en':''}</span>
            </div>
            <span className={`client-chevron${collapsed[client.name]?'':' open'}`} style={{cursor:'pointer',padding:'4px 8px'}} onClick={e=>{e.stopPropagation();setCollapsed(prev=>({...prev,[client.name]:!prev[client.name]}));}}><Ic.ChevronRight/></span>
          </div>
          {!collapsed[client.name]&&<div className="client-projects">
            {client.projects.map(proj=>(
              <div key={proj.id} className="project-row" onClick={()=>onSelect(proj.id)}>
                <div className={`project-status-bar ${proj.project_status||'g'}`}/>
                <div className="project-info">
                  <div className="project-name">{proj.name}</div>
                  <div className="project-meta">{fdate(proj.created_at)} · {eur(proj.offerte_total)} offerte{proj.deelprojecten.length>0?` · ${proj.deelprojecten.length} deelproject${proj.deelprojecten.length!==1?'en':''}`:''}</div>
                </div>
                {(()=>{const d=projectDoneStatus(proj.phases);return<Pill status={d?'done':proj.project_status||'g'} label={d?'Afgerond':undefined}/>;})()}
                <div onClick={e=>e.stopPropagation()} className="row-actions">
                  <button className="bi" style={{padding:5}} onClick={e=>{e.stopPropagation();onEdit(proj.id);}}><Ic.Edit/></button>
                  <button className="bi" style={{padding:5,color:'var(--rtxt)'}} onClick={e=>{e.stopPropagation();onDelete(proj.id);}}><Ic.Trash/></button>
                </div>
              </div>
            ))}
          </div>}
        </div>
      ))}
    </div>
  </div>;
}

function App(){

        project={curProject}

        onBack={()=>setView('overview')}
        onChange={p=>setProjects(prev=>prev.map(x=>x.id===p.id?p:x))}

    </div></div>}

    );
  });
}
</script>
